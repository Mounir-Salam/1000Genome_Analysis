services:
  pgdatabase:
    image: postgres:18
    container_name: local_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - genome_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - pg-local-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gui
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80"
    networks:
      - pg-local-network
    depends_on:
      - pgdatabase

volumes:
  genome_postgres_data:
  pgadmin_data:

networks:
  pg-local-network:
    driver: bridge